<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lector de Accesos</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background-color: #f8f9fa; margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
        .app-window { width: 100%; max-width: 420px; min-height: 100vh; background: #ffffff; display: flex; flex-direction: column; position: relative; box-shadow: 0 0 20px rgba(0,0,0,0.03); }
        
        /* Encabezado limpio */
        .header { padding: 25px 20px 15px 20px; text-align: center; border-bottom: 1px solid #f1f3f5; }
        .header h1 { font-size: 20px; font-weight: 700; color: #111111; margin: 0; letter-spacing: -0.5px; }
        .header p { font-size: 13px; color: #868e96; margin: 5px 0 0 0; }
        
        /* Zona de la Cámara */
        .camera-box { flex: 1; display: flex; align-items: center; justify-content: center; background: #fafbfc; padding: 20px; position: relative; }
        #reader { width: 100%; max-width: 340px; border: none !important; border-radius: 24px; overflow: hidden; box-shadow: 0 8px 24px rgba(0,0,0,0.04); }
        #reader__scan_region { background: #000; }
        
        /* Tarjeta de Resultado Flotante Estilo iOS / App de Google */
        .result-overlay { display: none; position: absolute; bottom: 0; left: 0; right: 0; background: #ffffff; border-radius: 32px 32px 0 0; box-shadow: 0 -10px 40px rgba(0,0,0,0.08); padding: 30px 24px; animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1); z-index: 10; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        
        .badge-success { background: #ebfbee; color: #2b8a3e; padding: 8px 16px; border-radius: 100px; font-weight: 700; font-size: 13px; display: inline-flex; align-items: center; gap: 6px; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 0.5px; }
        
        .invitado-name { font-size: 26px; font-weight: 700; color: #121212; margin: 0 0 20px 0; line-height: 1.2; }
        
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; border-top: 1px solid #f1f3f5; padding-top: 20px; }
        .info-item { display: flex; flex-direction: column; }
        .info-label { font-size: 11px; font-weight: 600; color: #adb5bd; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
        .info-value { font-size: 16px; font-weight: 600; color: #495057; }
        .pases-highlight { font-size: 24px; font-weight: 800; color: #228be6; }
        
        /* Botón de Confirmación Principal */
        .btn-confirm { width: 100%; background: #228be6; color: white; border: none; padding: 16px; border-radius: 16px; font-size: 16px; font-weight: 700; cursor: pointer; box-shadow: 0 4px 12px rgba(34,139,230,0.25); transition: all 0.2s; }
        .btn-confirm:active { transform: scale(0.98); background: #1c7ed6; }
    </style>
</head>
<body>
    <div class="app-window">
        <div class="header">
            <h1>Control de Accesos</h1>
            <p>Apunta la cámara al código QR del invitado</p>
        </div>
        
        <div class="camera-box">
            <div id="reader"></div>
            
            <div id="result-overlay" class="result-overlay">
                <div class="badge-success">✓ Acceso Confirmado</div>
                <h2 id="res-nombre" class="invitado-name">-</h2>
                
                <div class="info-grid">
                    <div class="info-item">
                        <span class="info-label">Pases Totales</span>
                        <span id="res-pases" class="info-value pases-highlight">-</span>
                    </div>
                    <div class="info-item" style="text-align: right;">
                        <span class="info-label">Estatus de Entrada</span>
                        <span class="info-value" style="color: #2b8a3e;">🟢 Válido</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">Código ID</span>
                        <span id="res-id" class="info-value" style="color:#868e96; font-size:14px;">-</span>
                    </div>
                </div>
                
                <button class="btn-confirm" onclick="resetScanner()">Confirmar e Ingresar</button>
            </div>
        </div>
    </div>

        function onScanSuccess(decodedText, decodedResult) {
            const id = decodedText.trim();
            if (bd[id]) {
                html5QrcodeScanner.clear();
                document.getElementById('res-id').innerText = id;
                document.getElementById('res-nombre').innerText = bd[id].nombre;
                document.getElementById('res-pases').innerText = bd[id].pases;
                document.getElementById('result-overlay').style.display = 'block';
            }
        }

        function startScanner() {
            document.getElementById('result-overlay').style.display = 'none';
            html5QrcodeScanner = new Html5QrcodeScanner("reader", { 
                fps: 15, 
                qrbox: 250,
                rememberLastUsedCamera: true
