    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #f4f4f9; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; justify-content: center; overflow: hidden; }
        .app-window { width: 100%; max-width: 420px; height: 100vh; background: #fff; display: flex; flex-direction: column; position: relative; box-shadow: 0 8px 24px rgba(0,0,0,0.04); }
        .header { padding: 24px 20px; text-align: center; border-bottom: 1px solid #f0f0f5; background: #fff; }
        .header h1 { font-size: 20px; font-weight: 700; color: #1d1d1f; letter-spacing: -0.5px; }
        .header p { font-size: 13px; color: #86868b; margin-top: 4px; }
        .camera-box { flex: 1; display: flex; align-items: center; justify-content: center; background: #fafafa; padding: 20px; position: relative; }
        #reader { width: 100%; max-width: 340px; border: none !important; background: #000; border-radius: 24px; overflow: hidden; }
        .card-overlay { position: absolute; bottom: 0; left: 0; right: 0; background: #fff; padding: 28px 24px; border-radius: 32px 32px 0 0; box-shadow: 0 -10px 30px rgba(0,0,0,0.08); transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1); z-index: 10; }
        .card-overlay.active { transform: translateY(0); }
        .handle { width: 40px; height: 5px; background: #e5e5ea; border-radius: 3px; margin: -12px auto 20px auto; }
        .status-badge { display: inline-block; padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 600; text-transform: uppercase; margin-bottom: 14px; }
        .status-badge.valido { background: #e8f5e9; color: #2e7d32; }
        .status-badge.error { background: #ffebee; color: #c62828; }
        .guest-name { font-size: 22px; font-weight: 700; color: #1d1d1f; margin-bottom: 6px; }
        .guest-info { font-size: 15px; color: #515154; margin-bottom: 24px; }
        .btn-action { width: 100%; padding: 16px; border: none; border-radius: 16px; font-size: 16px; font-weight: 600; cursor: pointer; }
        .btn-action.success { background: #0071e3; color: #fff; }
        .btn-action.close { background: #f5f5f7; color: #1d1d1f; margin-top: 10px; }
    </style>
</head>
<body>

<div class="app-window">
    <div class="header">
        <h1>Control de Acceso</h1>
        <p>Apunta al código QR de la invitación</p>
    </div>
    <div class="camera-box">
        <div id="reader"></div>
    </div>
    <div id="result-card" class="card-overlay">
        <div class="handle"></div>
        <span id="badge" class="status-badge valido">Acceso Permitido</span>
        <div id="card-content"></div>
        <button id="btn-primary" class="btn-action success" onclick="registrarIngreso()">Registrar Entrada</button>
        <button class="btn-action close" onclick="cerrarTarjeta()">Cerrar</button>
    </div>
</div>

    let usuarioActualId = null;
    let html5QrcodeScanner = null;

    function inicializarEscaner() {
        html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: { width: 250, height: 250 }, rememberLastUsedCamera: true });
        html5QrcodeScanner.render(onScanSuccess);
    }

    function onScanSuccess(decodedText) {
        try {
            let url = new URL(decodedText);
            let id = url.searchParams.get("id");
            if (id && de_invitados[id]) { mostrarTarjeta(id); }
            else { mostrarError("Código Desconocido", "Este QR no pertenece al evento."); }
        } catch(e) {
            if(de_invitados[decodedText]) { mostrarTarjeta(decodedText); }
            else { mostrarError("QR Inválido", "El formato escaneado no es correcto."); }
        }
    }

    function mostrarTarjeta(id) {
        usuarioActualId = id;
        const info = de_invitados[id];
        const badge = document.getElementById("badge");
        document.getElementById("btn-primary").style.display = "block";
        badge.className = "status-badge valido";
        badge.innerText = "Pase Confirmado";
        
        document.getElementById("card-content").innerHTML = `
            <div class="guest-name">${info.nombre}</div>
            <div class="guest-info">Pases asignados: <strong>${info.pases}</strong></div>
        `;
        document.getElementById("result-card").classList.add("active");
    }

    function mostrarError(titulo, detalle) {
        document.getElementById("btn-primary").style.display = "none";
        document.getElementById("badge").className = "status-badge error";
        document.getElementById("badge").innerText = "Error";
        document.getElementById("card-content").innerHTML = `
            <div class="guest-name">${titulo}</div>
            <div class="guest-info">${detalle}</div>
        `;
        document.getElementById("result-card").classList.add("active");
    }

    function registrarIngreso() {
        if(usuarioActualId && de_invitados[usuarioActualId]) {
            alert(`¡Entrada Registrada!\nTitular: ${de_invitados[usuarioActualId].nombre}`);
            cerrarTarjeta();
        }
    }

    function cerrarTarjeta() {
        document.getElementById("result-card").classList.remove("active");
        usuarioActualId = null;
    }

    window.onload = inicializarEscaner;
</script>
</body>
